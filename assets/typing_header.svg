<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 110" width="800" height="110">
  <style>
    .typing-text {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
      font-weight: 700;
      dominant-baseline: middle;
    }
    .line1 {
      font-size: 26px;
      fill: #7aa2f7;
    }
    .line2 {
      font-size: 18px;
      fill: #bb9af7;
    }
  </style>
  <defs>
    <clipPath id="clip-line1">
      <rect x="0" y="0" width="0" height="110">
        <animate attributeName="width" from="0" to="445" dur="2s" begin="0.5s" fill="freeze" calcMode="linear" />
      </rect>
    </clipPath>
    <clipPath id="clip-line2">
      <rect x="0" y="0" width="0" height="110">
        <animate attributeName="width" from="0" to="285" dur="1.5s" begin="2.7s" fill="freeze" calcMode="linear" />
      </rect>
    </clipPath>
  </defs>
  <g clip-path="url(#clip-line1)">
    <text x="15" y="35" class="typing-text line1">Hi, I'm Devendra Raj Singh 👋</text>
  </g>
  <g clip-path="url(#clip-line2)">
    <text x="15" y="75" class="typing-text line2">AI/ML &amp; Software Developer</text>
  </g>
  <rect x="15" y="20" width="3" height="28" fill="#ff007f" opacity="0">
    <animate attributeName="x" from="15" to="457" dur="2s" begin="0.5s" fill="freeze" calcMode="linear" />
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.4;0.5;0.9;1" dur="0.8s" repeatCount="indefinite" />
    <animate attributeName="visibility" to="hidden" begin="2.5s" fill="freeze" />
  </rect>
  <rect x="15" y="62" width="3" height="22" fill="#ff007f" opacity="0">
    <animate attributeName="visibility" to="visible" begin="2.5s" fill="freeze" />
    <animate attributeName="x" from="15" to="297" dur="1.5s" begin="2.7s" fill="freeze" calcMode="linear" />
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.4;0.5;0.9;1" dur="0.8s" begin="2.5s" repeatCount="indefinite" />
  </rect>
</svg>