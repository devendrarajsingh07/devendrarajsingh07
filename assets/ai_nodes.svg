  <line class="connection" x1="220" y1="120" x2="380" y2="100" stroke="#bb9af7" />
  <line class="connection" x1="220" y1="120" x2="380" y2="150" stroke="#bb9af7" />
  <line class="signal" x1="220" y1="120" x2="380" y2="150" stroke="#7dcfff" style="animation-duration: 2.0s;" />
  <line class="connection" x1="220" y1="160" x2="380" y2="50" stroke="#bb9af7" />
  <line class="signal" x1="220" y1="160" x2="380" y2="50" stroke="#7dcfff" style="animation-duration: 2.5s;" />
