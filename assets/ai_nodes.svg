<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <style>
    .node {
      animation: pulse 3s ease-in-out infinite;
      transform-origin: center;
    }
    .pulse-slow { animation-duration: 4s; }
    .pulse-fast { animation-duration: 2s; }
    @keyframes pulse {
      0%, 100% { r: 5px; opacity: 0.7; }
      50% { r: 8px; opacity: 1; filter: drop-shadow(0 0 4px currentColor); }
    }
    .connection {
      stroke-opacity: 0.15;
      stroke-width: 1;
    }
    .signal {
      stroke-dasharray: 8 50;
      stroke-width: 1.5;
      animation: signal-run 3s linear infinite;
    }
    @keyframes signal-run {
      from { stroke-dashoffset: 58; }
      to { stroke-dashoffset: 0; }
    }
  </style>
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#1a1b26" rx="8" />
  <text x="20" y="25" fill="#7aa2f7" font-family="monospace" font-size="11" font-weight="bold">neural_network_simulation.py</text>
  <line class="connection" x1="80" y1="50" x2="220" y2="40" stroke="#7aa2f7" />
  <line class="signal" x1="80" y1="50" x2="220" y2="40" stroke="#bb9af7" style="animation-duration: 2.0s;" />
  <line class="connection" x1="80" y1="50" x2="220" y2="80" stroke="#7aa2f7" />
  <line class="connection" x1="80" y1="50" x2="220" y2="120" stroke="#7aa2f7" />
  <line class="connection" x1="80" y1="50" x2="220" y2="160" stroke="#7aa2f7" />
  <line class="signal" x1="80" y1="50" x2="220" y2="160" stroke="#bb9af7" style="animation-duration: 2.5s;" />
  <line class="connection" x1="80" y1="100" x2="220" y2="40" stroke="#7aa2f7" />
  <line class="connection" x1="80" y1="100" x2="220" y2="80" stroke="#7aa2f7" />
  <line class="signal" x1="80" y1="100" x2="220" y2="80" stroke="#bb9af7" style="animation-duration: 3.0s;" />
  <line class="connection" x1="80" y1="100" x2="220" y2="120" stroke="#7aa2f7" />
  <line class="connection" x1="80" y1="100" x2="220" y2="160" stroke="#7aa2f7" />
  <line class="connection" x1="80" y1="150" x2="220" y2="40" stroke="#7aa2f7" />
  <line class="connection" x1="80" y1="150" x2="220" y2="80" stroke="#7aa2f7" />
  <line class="connection" x1="80" y1="150" x2="220" y2="120" stroke="#7aa2f7" />
  <line class="signal" x1="80" y1="150" x2="220" y2="120" stroke="#bb9af7" style="animation-duration: 2.0s;" />
  <line class="connection" x1="80" y1="150" x2="220" y2="160" stroke="#7aa2f7" />
  <line class="connection" x1="220" y1="40" x2="380" y2="50" stroke="#bb9af7" />
  <line class="signal" x1="220" y1="40" x2="380" y2="50" stroke="#7dcfff" style="animation-duration: 2.5s;" />
  <line class="connection" x1="220" y1="40" x2="380" y2="100" stroke="#bb9af7" />
  <line class="connection" x1="220" y1="40" x2="380" y2="150" stroke="#bb9af7" />
  <line class="connection" x1="220" y1="80" x2="380" y2="50" stroke="#bb9af7" />
