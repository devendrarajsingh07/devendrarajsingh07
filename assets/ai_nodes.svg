  <line class="connection" x1="380" y1="150" x2="520" y2="125" stroke="#7dcfff" />
  <circle class="node pulse-slow" cx="80" cy="50" r="6" fill="#7aa2f7" style="color: #7aa2f7;" />
  <circle class="node pulse-fast" cx="80" cy="100" r="6" fill="#7aa2f7" style="color: #7aa2f7;" />
  <circle class="node " cx="80" cy="150" r="6" fill="#7aa2f7" style="color: #7aa2f7;" />
  <circle class="node pulse-slow" cx="220" cy="40" r="6" fill="#bb9af7" style="color: #bb9af7;" />
  <circle class="node pulse-fast" cx="220" cy="80" r="6" fill="#bb9af7" style="color: #bb9af7;" />
  <circle class="node " cx="220" cy="120" r="6" fill="#bb9af7" style="color: #bb9af7;" />
  <circle class="node pulse-slow" cx="220" cy="160" r="6" fill="#bb9af7" style="color: #bb9af7;" />
  <circle class="node pulse-slow" cx="380" cy="50" r="6" fill="#7dcfff" style="color: #7dcfff;" />
  <circle class="node pulse-fast" cx="380" cy="100" r="6" fill="#7dcfff" style="color: #7dcfff;" />
  <circle class="node " cx="380" cy="150" r="6" fill="#7dcfff" style="color: #7dcfff;" />
  <circle class="node pulse-slow" cx="520" cy="75" r="6" fill="#ff007f" style="color: #ff007f;" />
  <circle class="node pulse-fast" cx="520" cy="125" r="6" fill="#ff007f" style="color: #ff007f;" />
</svg>